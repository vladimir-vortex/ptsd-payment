<section *ngIf="!isShowResultBlock" class="px-4 sm:px-8 py-10 sm:py-14">
    <div class="tm-container tm-container-2xs">
        <h1 class="tm-section-header">{{ 'page.lusher.header' | transloco }}</h1>

            </div> 
        </div>
    </div>
</section>
