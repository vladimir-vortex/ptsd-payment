<!-- accordion-item.component.html -->
<div class="accordion-item">
  <button class="flex items-center w-full gap-2" (click)="toggle()">
    <div class="flex-1 w-full text-left accordion-header py-8">{{ title }}</div>
    <div class="flex-initial w-auto" [@arrowRotate]="!isOpen ? 'expanded' : 'collapsed'">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M12 10.8004L8.10005 14.7004C7.91672 14.8837 7.68338 14.9754 7.40005 14.9754C7.11672 14.9754 6.88338 14.8837 6.70005 14.7004C6.51672 14.5171 6.42505 14.2837 6.42505 14.0004C6.42505 13.7171 6.51672 13.4837 6.70005 13.3004L11.3 8.70039C11.5 8.50039 11.7334 8.40039 12 8.40039C12.2667 8.40039 12.5 8.50039 12.7 8.70039L17.3 13.3004C17.4834 13.4837 17.575 13.7171 17.575 14.0004C17.575 14.2837 17.4834 14.5171 17.3 14.7004C17.1167 14.8837 16.8834 14.9754 16.6 14.9754C16.3167 14.9754 16.0834 14.8837 15.9 14.7004L12 10.8004Z"
          fill="#495C66" />
      </svg>
    </div>
  </button>
  <div class="overflow-hidden" [@bodyExpand]="isOpen ? 'expanded' : 'collapsed'">
    <div class="pb-8">
      <ng-content></ng-content>
    </div>
  </div>
</div>
