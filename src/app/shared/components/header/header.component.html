                            {{ 'header.textLinkHome' | transloco }}
                        </a>
                    </div>
                    <div class="flex-none">
                        <a routerLink="{{currentLang.id}}/about" class="flex-initial menu-icon-button h-10">
                            {{ 'header.textLinkAbout' | transloco }}
                        </a>
                    </div>
                    <div class="flex-none">
                        <a routerLink="{{currentLang.id}}/author" class="flex-initial menu-icon-button h-10">

                        </a>
                    </div>
                </div>
            </div>

                <div class="w-auto">
                    <button [matMenuTriggerFor]="lang" class="menu-icon-button flex items-center h-10">

                            {{currentLang.id}}
                        </div>
                        <div class="flex-initial">
                            <svg class="w-auto" width="25" height="24" viewBox="0 0 25 24" fill="none" xmlns="http://www.w3.org/2000/svg">

                            </svg>
                        </div>
                    </button>
                    <mat-menu #lang="matMenu" xPosition="before" class="header-dropdown">
                        <a [routerLink]="[lang_item.id + currentUrl]" mat-menu-item *ngFor="let lang_item of langs">
                            <div class="flex gap-2">
                                <div>
                                    {{lang_item.label}}
                                </div>
                            </div>
                        </a>
                    </mat-menu>
                </div>
                <div class="flex-initial hidden sm:flex items-center">
                    <a routerLink="{{currentLang.id}}/ptsd-test" class="tm-button tm-button-stroked tm-button-primary tm-button-sm" matRipple>{{ t("common.button.startPtsdTest") }}</a>
                </div>
            </div>
        </div>
    </div>
</header>
